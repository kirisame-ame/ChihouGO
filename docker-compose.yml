services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chihougo-backend
    ports:
      - "5001:5001"
    volumes:
      - ./backend:/app
    environment:
      - FLASK_ENV=production
    restart: unless-stopped

  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: chihougo-frontend
    ports:
      - "8080:80"

    restart: unless-stopped

networks:
  default:
    name: chihougo-network
